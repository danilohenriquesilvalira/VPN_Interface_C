name: Build RLS VPN (C)

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-binutils

      - name: Build
        shell: msys2 {0}
        run: |
          windres src/resource.rc -O coff -o src/resource.o
          gcc -Wall -O2 -Isrc -mwindows -o rls_vpn.exe \
            src/main.c src/vpn.c src/resource.o \
            -lcomctl32 -lgdi32 -lshcore
          ls -lh rls_vpn.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rls_vpn_windows_x64
          path: rls_vpn.exe
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "RLS Automacao VPN ${{ github.ref_name }}"
          body: |
            ## RLS Automacao VPN ${{ github.ref_name }}

            ### Como usar
            1. Baixe `rls_vpn.exe`
            2. Execute como **Administrador**
            3. Na primeira execucao o SoftEther VPN Client e instalado automaticamente

            ### Requisitos
            - Windows 10 / 11 (64-bit)
            - Permissoes de Administrador
          files: rls_vpn.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
