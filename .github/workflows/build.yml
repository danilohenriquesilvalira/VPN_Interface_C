name: Build RLS VPN (C)

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build Windows EXE + MSI
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-binutils mingw-w64-x86_64-make

      - name: Download SoftEther VPN Client
        shell: pwsh
        run: |
          # Try GitHub API first (SoftEtherVPN_Stable)
          try {
            $api = Invoke-RestMethod `
              -Uri 'https://api.github.com/repos/SoftEtherVPN/SoftEtherVPN_Stable/releases/latest' `
              -Headers @{ 'User-Agent' = 'rls-vpn-build' }
            Write-Host "Latest SoftEther release: $($api.tag_name)"
            $asset = $api.assets | Where-Object {
              ($_.name -match 'vpnclient' -or $_.name -match 'VPN.Client') -and
              ($_.name -match 'windows'   -or $_.name -match 'Windows')    -and
              ($_.name -match '\.exe$'    -or $_.name -match '\.msi$')
            } | Select-Object -First 1
            if ($asset) {
              Write-Host "Downloading: $($asset.name)"
              Invoke-WebRequest -Uri $asset.browser_download_url -OutFile se_client.exe -UseBasicParsing
              $sz = (Get-Item se_client.exe).Length
              Write-Host "Downloaded: $([math]::Round($sz/1MB,1)) MB"
              if ($sz -gt 1MB) { exit 0 }
            }
          } catch {
            Write-Host "GitHub API failed: $_"
          }

          # Fallback URLs
          Write-Host "Trying fallback URL..."
          $urls = @(
            'https://github.com/SoftEtherVPN/SoftEtherVPN_Stable/releases/download/v4.43-9799/softether-vpnclient-v4.43-9799-rtm-2023.08.31-windows-x86_64.exe',
            'https://github.com/SoftEtherVPN/SoftEtherVPN_Stable/releases/download/v4.42-9798/softether-vpnclient-v4.42-9798-rtm-2023.06.30-windows-x86_64.exe'
          )
          foreach ($url in $urls) {
            try {
              Write-Host "Trying: $url"
              Invoke-WebRequest -Uri $url -OutFile se_client.exe -UseBasicParsing -TimeoutSec 120
              $sz = (Get-Item se_client.exe).Length
              if ($sz -gt 1MB) {
                Write-Host "Success: $([math]::Round($sz/1MB,1)) MB"
                exit 0
              }
            } catch { Write-Host "Failed: $_" }
          }

          Write-Error "Could not download SoftEther VPN Client installer."
          exit 1

      - name: Generate installer graphics from RLS logo
        shell: pwsh
        run: |
          pip install pillow -q
          python - << 'PYEOF'
          from PIL import Image, ImageDraw
          import sys

          src = "src"
          logo = Image.open(f"{src}/logo_rls.png").convert("RGBA")

          # Banner 493x58: fundo branco (WiX escreve titulo em cima), logo RLS direita
          banner = Image.new("RGB", (493, 58), (255, 255, 255))
          logo_sm = logo.resize((44, 44), Image.LANCZOS)
          banner.paste(logo_sm, (441, 7), logo_sm)
          d = ImageDraw.Draw(banner)
          d.line([(0, 57), (493, 57)], fill=(210, 215, 220), width=1)
          d.line([(418, 8), (418, 50)], fill=(210, 215, 220), width=1)
          banner.save(f"{src}/banner.bmp", "BMP")
          print("banner.bmp OK")

          # Dialog 493x312: painel esquerdo escuro com logo centrado
          dialog = Image.new("RGB", (493, 312), (248, 249, 250))
          d2 = ImageDraw.Draw(dialog)
          # painel esquerdo
          d2.rectangle([(0, 0), (163, 312)], fill=(13, 17, 23))
          d2.rectangle([(0, 0), (163, 4)],   fill=(31, 111, 235))
          d2.line([(163, 0), (163, 312)],     fill=(31, 111, 235), width=2)
          # logo centrado no painel
          logo_lg = logo.resize((100, 100), Image.LANCZOS)
          dialog.paste(logo_lg, (32, 80), logo_lg)
          d2.text((30, 192), "RLS Automacao",  fill=(255, 255, 255))
          d2.text((42, 212), "VPN Client",     fill=(139, 148, 158))
          d2.text((58, 236), "v1.5.5",         fill=(80, 90, 100))
          dialog.save(f"{src}/dialog.bmp", "BMP")
          print("dialog.bmp OK")
          PYEOF

      - name: Generate license RTF (necessario para WixUI_InstallDir)
        shell: pwsh
        run: |
          $rtf = '{\rtf1\ansi\deff0{\fonttbl{\f0 Segoe UI;}}' +
                 '\f0\fs20 ' +
                 'RLS Automacao VPN - Licenca de Utilizacao\par\par' +
                 'Este software e propriedade da RLS Automacao.\par' +
                 'A utilizacao e permitida apenas em equipamentos autorizados pela RLS Automacao.\par\par' +
                 'Ao instalar, aceita os termos desta licenca.\par' +
                 '(c) 2026 RLS Automacao. Todos os direitos reservados.\par}'
          Set-Content -Path "src\license.rtf" -Value $rtf -Encoding ASCII
          Write-Host "license.rtf criado"

      - name: Build EXE (via Makefile)
        shell: msys2 {0}
        run: |
          mingw32-make clean
          mingw32-make
          ls -lh rls_vpn.exe

      - name: Build MSI (WiX com UI e logo RLS)
        shell: pwsh
        run: |
          # Localiza WiX Toolset
          $wixDir = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset*" -Directory |
                    Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixDir) { throw "WiX Toolset nao encontrado em Program Files (x86)" }
          $wix = Join-Path $wixDir.FullName "bin"
          Write-Host "WiX: $wix"

          # Compila com WixUIExtension para UI com branding
          & "$wix\candle.exe" -arch x64 installer.wxs -o installer.wixobj `
            -ext "$wix\WixUIExtension.dll"
          if ($LASTEXITCODE -ne 0) { throw "candle.exe falhou com codigo $LASTEXITCODE" }

          # Linka com WixUIExtension
          & "$wix\light.exe" installer.wixobj -o rls_vpn.msi `
            -ext "$wix\WixUIExtension.dll"
          if ($LASTEXITCODE -ne 0) { throw "light.exe falhou com codigo $LASTEXITCODE" }

          $sz = [math]::Round((Get-Item rls_vpn.msi).Length / 1MB, 1)
          Write-Host "MSI compilado com sucesso: $sz MB"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rls_vpn_windows_x64
          path: |
            rls_vpn.exe
            rls_vpn.msi
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "RLS Automacao VPN ${{ github.ref_name }}"
          body: |
            ## RLS Automacao VPN ${{ github.ref_name }}

            ### Novidades
            - UI nativa Win32 GDI — sem WebView2, inicio instantaneo
            - Botao LIGAR/DESLIGAR com cores verde/vermelho em tempo real
            - Scan de rede VPN (ping/MAC/hostname de todos os dispositivos)
            - Status SoftEther na tabela de adaptadores
            - Protecao por senha no botao Reset (Rls@2024)
            - Icone e branding RLS em toda a UI e instalador
            - CRITICAL_SECTION em vpncmd — sem conflitos de threads

            ### Como instalar
            1. Baixe **`rls_vpn.msi`** (recomendado) ou **`rls_vpn.exe`** standalone
            2. Execute o MSI como **Administrador**
            3. O SoftEther VPN Client e instalado automaticamente
            4. Abra o atalho **RLS Automacao VPN** no Ambiente de Trabalho

            ### Requisitos
            - Windows 10 / 11 (64-bit)
            - Permissoes de Administrador
          files: |
            rls_vpn.exe
            rls_vpn.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
