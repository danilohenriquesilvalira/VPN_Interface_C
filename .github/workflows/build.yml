name: Build RLS VPN (C)

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-binutils

      - name: Download SoftEther VPN Client
        shell: pwsh
        run: |
          # Fetch latest stable release from SoftEtherVPN_Stable
          $api = Invoke-RestMethod `
            -Uri 'https://api.github.com/repos/SoftEtherVPN/SoftEtherVPN_Stable/releases/latest' `
            -Headers @{ 'User-Agent' = 'rls-vpn-build' }
          Write-Host "Latest SoftEther release: $($api.tag_name)"

          # Find the Windows VPN Client installer asset
          $asset = $api.assets | Where-Object {
            $_.name -match 'vpnclient' -and $_.name -match 'windows'
          } | Select-Object -First 1

          if (-not $asset) {
            Write-Error "No Windows VPN Client asset found in SoftEther latest release."
            Write-Host "Available assets:"
            $api.assets | ForEach-Object { Write-Host "  $($_.name)" }
            exit 1
          }

          Write-Host "Downloading: $($asset.name) ($([math]::Round($asset.size/1MB,1)) MB)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile se_client.exe -UseBasicParsing

          $size = (Get-Item se_client.exe).Length
          Write-Host "Download complete: $size bytes"
          if ($size -lt 1MB) {
            Write-Error "Downloaded file is too small - download may have failed"
            exit 1
          }

      - name: Build
        shell: msys2 {0}
        run: |
          windres src/resource.rc -O coff -o src/resource.o
          gcc -Wall -O2 -Isrc -mwindows -o rls_vpn.exe \
            src/main.c src/vpn.c src/resource.o \
            -lcomctl32 -lgdi32 -lshcore
          ls -lh rls_vpn.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rls_vpn_windows_x64
          path: rls_vpn.exe
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "RLS Automacao VPN ${{ github.ref_name }}"
          body: |
            ## RLS Automacao VPN ${{ github.ref_name }}

            ### Como usar
            1. Baixe `rls_vpn.exe`
            2. Execute como **Administrador**
            3. Na primeira execucao o SoftEther VPN Client e instalado automaticamente

            ### Requisitos
            - Windows 10 / 11 (64-bit)
            - Permissoes de Administrador
          files: rls_vpn.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
