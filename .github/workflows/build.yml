name: Build RLS VPN (C)

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build Windows EXE + MSI
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-binutils

      - name: Download WebView2 SDK (NuGet)
        shell: pwsh
        run: |
          $version = "1.0.2849.39"
          $url = "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/$version"
          Write-Host "Downloading WebView2 SDK v$version..."
          Invoke-WebRequest -Uri $url -OutFile wv2.nupkg -UseBasicParsing
          Rename-Item wv2.nupkg wv2.zip
          Expand-Archive wv2.zip wv2sdk -Force
          # Copy ALL headers (WebView2.h includes WebView2EnvironmentOptions.h etc.)
          Copy-Item "wv2sdk\build\native\include\*.h" "src\" -Force
          Copy-Item "wv2sdk\build\native\x64\WebView2Loader.dll" "." -Force
          $headers = (Get-ChildItem "src\*.h" | Where-Object { $_.Name -like "WebView2*" }).Count
          Write-Host "Copied $headers WebView2 header(s) to src/"
          Write-Host "WebView2Loader.dll copied to workspace root"

      - name: Download SoftEther VPN Client
        shell: pwsh
        run: |
          # Try GitHub API first (SoftEtherVPN_Stable)
          try {
            $api = Invoke-RestMethod `
              -Uri 'https://api.github.com/repos/SoftEtherVPN/SoftEtherVPN_Stable/releases/latest' `
              -Headers @{ 'User-Agent' = 'rls-vpn-build' }
            Write-Host "Latest SoftEther release: $($api.tag_name)"
            $asset = $api.assets | Where-Object {
              ($_.name -match 'vpnclient' -or $_.name -match 'VPN.Client') -and
              ($_.name -match 'windows'   -or $_.name -match 'Windows')    -and
              ($_.name -match '\.exe$'    -or $_.name -match '\.msi$')
            } | Select-Object -First 1
            if ($asset) {
              Write-Host "Downloading: $($asset.name)"
              Invoke-WebRequest -Uri $asset.browser_download_url -OutFile se_client.exe -UseBasicParsing
              $sz = (Get-Item se_client.exe).Length
              Write-Host "Downloaded: $([math]::Round($sz/1MB,1)) MB"
              if ($sz -gt 1MB) { exit 0 }
            }
          } catch {
            Write-Host "GitHub API failed: $_"
          }

          # Fallback URLs
          Write-Host "Trying fallback URL..."
          $urls = @(
            'https://github.com/SoftEtherVPN/SoftEtherVPN_Stable/releases/download/v4.43-9799/softether-vpnclient-v4.43-9799-rtm-2023.08.31-windows-x86_64.exe',
            'https://github.com/SoftEtherVPN/SoftEtherVPN_Stable/releases/download/v4.42-9798/softether-vpnclient-v4.42-9798-rtm-2023.06.30-windows-x86_64.exe'
          )
          foreach ($url in $urls) {
            try {
              Write-Host "Trying: $url"
              Invoke-WebRequest -Uri $url -OutFile se_client.exe -UseBasicParsing -TimeoutSec 120
              $sz = (Get-Item se_client.exe).Length
              if ($sz -gt 1MB) {
                Write-Host "Success: $([math]::Round($sz/1MB,1)) MB"
                exit 0
              }
            } catch { Write-Host "Failed: $_" }
          }

          Write-Error "Could not download SoftEther VPN Client installer."
          exit 1

      - name: Generate installer graphics (banner + dialog BMP com logo RLS)
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing

          # ── Banner (493x58) ─────────────────────────────────────────────────
          # IMPORTANTE: WiX renderiza o titulo da pagina (ex: "End-User License
          # Agreement") como texto preto sobre este bitmap, na area ESQUERDA
          # (aprox. x=11..390). Por isso o bitmap NAO pode ter texto ou graficos
          # na zona esquerda -- apenas fundo branco limpo.
          # O branding RLS fica exclusivamente na zona DIREITA (x >= 420).
          $bmp = New-Object System.Drawing.Bitmap(493, 58)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
          $g.TextRenderingHint = [System.Drawing.Text.TextRenderingHint]::ClearTypeGridFit

          # Fundo totalmente branco -- WiX renderiza o titulo do dialogo aqui
          $g.Clear([System.Drawing.Color]::White)

          # Linha separadora fina no fundo (igual ao WiX padrao)
          $sepPen = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(210, 215, 220), 1)
          $g.DrawLine($sepPen, 0, 57, 493, 57)

          # Separador vertical discreto antes do logo (x=418)
          $divPen = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(210, 215, 220), 1)
          $g.DrawLine($divPen, 418, 8, 418, 50)

          # Circulo logo RLS no canto DIREITO -- longe do texto do WiX
          $accentBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(31, 111, 235))
          $g.FillEllipse($accentBrush, 428, 10, 36, 36)
          $sf = New-Object System.Drawing.StringFormat
          $sf.Alignment = [System.Drawing.StringAlignment]::Center
          $sf.LineAlignment = [System.Drawing.StringAlignment]::Center
          $whiteBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
          $logoFont = New-Object System.Drawing.Font("Segoe UI", 14, [System.Drawing.FontStyle]::Bold)
          $g.DrawString("R", $logoFont, $whiteBrush, (New-Object System.Drawing.RectangleF(428, 10, 36, 36)), $sf)

          $bmp.Save("src\banner.bmp", [System.Drawing.Imaging.ImageFormat]::Bmp)
          $g.Dispose(); $bmp.Dispose()
          Write-Host "banner.bmp criado: 493x58 (branding direita, esquerda livre para WiX)"  

          # ── Dialog bitmap (493x312) ─────────────────────────────────────────
          # Paginas Welcome e Finish: painel esquerdo escuro + branding centrado
          $dlg = New-Object System.Drawing.Bitmap(493, 312)
          $gd = [System.Drawing.Graphics]::FromImage($dlg)
          $gd.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
          $gd.TextRenderingHint = [System.Drawing.Text.TextRenderingHint]::ClearTypeGridFit

          # Fundo direito (claro, igual ao WiX padrao)
          $gd.Clear([System.Drawing.Color]::FromArgb(248, 249, 250))

          # Painel esquerdo escuro (164px de largura)
          $panelW = 164
          $leftBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(13, 17, 23))
          $gd.FillRectangle($leftBrush, 0, 0, $panelW, 312)

          # Barra azul no topo do painel (4px)
          $accentBrush2 = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(31, 111, 235))
          $gd.FillRectangle($accentBrush2, 0, 0, $panelW, 4)

          # Linha divisoria azul na direita do painel
          $sepPen2 = New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(31, 111, 235), 2)
          $gd.DrawLine($sepPen2, $panelW, 0, $panelW, 312)

          # --- Branding centrado no painel esquerdo ---
          # Circulo grande: horizontalmente centrado em $panelW/2 = 82
          $circR = 52   # raio
          $circX = 82 - $circR   # 30
          $circY = 80
          $gd.FillEllipse($accentBrush2, $circX, $circY, ($circR * 2), ($circR * 2))

          # "R" centrado dentro do circulo
          $sf2 = New-Object System.Drawing.StringFormat
          $sf2.Alignment = [System.Drawing.StringAlignment]::Center
          $sf2.LineAlignment = [System.Drawing.StringAlignment]::Center
          $whiteBrush2 = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::White)
          $bigFont = New-Object System.Drawing.Font("Segoe UI", 36, [System.Drawing.FontStyle]::Bold)
          $gd.DrawString("R", $bigFont, $whiteBrush2, `
            (New-Object System.Drawing.RectangleF($circX, $circY, ($circR * 2), ($circR * 2))), $sf2)

          # "RLS" centrado abaixo do circulo
          $sf3 = New-Object System.Drawing.StringFormat
          $sf3.Alignment = [System.Drawing.StringAlignment]::Center
          $sf3.LineAlignment = [System.Drawing.StringAlignment]::Near
          $rlsFont = New-Object System.Drawing.Font("Segoe UI", 15, [System.Drawing.FontStyle]::Bold)
          $gd.DrawString("RLS", $rlsFont, $whiteBrush2, `
            (New-Object System.Drawing.RectangleF(0, 192, $panelW, 26)), $sf3)

          # "Automacao" centrado
          $dimBrush2 = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(139, 148, 158))
          $subFont2 = New-Object System.Drawing.Font("Segoe UI", 10)
          $gd.DrawString("Automacao", $subFont2, $dimBrush2, `
            (New-Object System.Drawing.RectangleF(0, 220, $panelW, 20)), $sf3)

          # "VPN Client" centrado
          $gd.DrawString("VPN Client", $subFont2, $dimBrush2, `
            (New-Object System.Drawing.RectangleF(0, 242, $panelW, 20)), $sf3)

          # "v1.2.0" centrado, mais discreto
          $verFont = New-Object System.Drawing.Font("Segoe UI", 9)
          $verBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(80, 90, 100))
          $gd.DrawString("v1.3.0", $verFont, $verBrush, `
            (New-Object System.Drawing.RectangleF(0, 268, $panelW, 18)), $sf3)

          $dlg.Save("src\dialog.bmp", [System.Drawing.Imaging.ImageFormat]::Bmp)
          $gd.Dispose(); $dlg.Dispose()
          Write-Host "dialog.bmp criado: 493x312"

      - name: Generate license RTF (necessario para WixUI_InstallDir)
        shell: pwsh
        run: |
          $rtf = '{\rtf1\ansi\deff0{\fonttbl{\f0 Segoe UI;}}' +
                 '\f0\fs20 ' +
                 'RLS Automacao VPN - Licenca de Utilizacao\par\par' +
                 'Este software e propriedade da RLS Automacao.\par' +
                 'A utilizacao e permitida apenas em equipamentos autorizados pela RLS Automacao.\par\par' +
                 'Ao instalar, aceita os termos desta licenca.\par' +
                 '(c) 2026 RLS Automacao. Todos os direitos reservados.\par}'
          Set-Content -Path "src\license.rtf" -Value $rtf -Encoding ASCII
          Write-Host "license.rtf criado"

      - name: Build EXE (C + C++ WebView2)
        shell: msys2 {0}
        run: |
          # ── Create MinGW import library for WebView2Loader.dll ──────────────
          # WebView2Loader.dll was downloaded to workspace root in the NuGet step.
          # MinGW cannot use the MSVC .lib; dlltool generates a compatible .a file.
          cat > WebView2Loader.def << 'EOF'
          LIBRARY WebView2Loader.dll
          EXPORTS
              CreateCoreWebView2EnvironmentWithOptions
              CreateCoreWebView2Environment
              GetAvailableCoreWebView2BrowserVersionString
              CompareBrowserVersions
          EOF
          dlltool -D WebView2Loader.dll -d WebView2Loader.def -l libWebView2Loader.a
          echo "libWebView2Loader.a created: $(ls -lh libWebView2Loader.a)"

          # Resource (embeds ui.html as RCDATA 102)
          windres src/resource.rc -O coff -o src/resource.o

          # C sources
          gcc -Wall -O2 -Isrc -mwindows -c -o src/main.o src/main.c
          gcc -Wall -O2 -Isrc -mwindows -c -o src/vpn.o  src/vpn.c

          # C++ bridge (needs WebView2.h, copied to src/ above)
          g++ -Wall -O2 -Isrc -mwindows -std=c++17 -c -o src/webview_bridge.o src/webview_bridge.cpp

          # Link with g++ to handle C++ symbols
          # -L.             : find libWebView2Loader.a in workspace root
          # -lWebView2Loader : resolves CreateCoreWebView2EnvironmentWithOptions
          # -luuid           : resolves IID_IUnknown and other COM GUIDs (MinGW)
          g++ -mwindows \
            -o rls_vpn.exe \
            src/main.o src/vpn.o src/webview_bridge.o src/resource.o \
            -L. -lWebView2Loader \
            -lcomctl32 -lgdi32 -lshcore -lole32 -luuid -lgdiplus -lstdc++ -lshell32

          ls -lh rls_vpn.exe

          # ── Copy MinGW runtime DLLs to workspace root ──────────────────────
          # These DLLs must ship alongside rls_vpn.exe on the target machine.
          # ldd finds exactly which ones are needed from the MSYS2 environment.
          MINGW_BIN=/mingw64/bin
          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            if [ -f "$MINGW_BIN/$dll" ]; then
              cp "$MINGW_BIN/$dll" .
              echo "Copied: $dll"
            else
              echo "WARNING: $dll not found in $MINGW_BIN"
            fi
          done
          echo "Runtime DLLs in workspace:"
          ls -lh lib*.dll 2>/dev/null || true

      - name: Build MSI (WiX com UI e logo RLS)
        shell: pwsh
        run: |
          # Localiza WiX Toolset
          $wixDir = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset*" -Directory |
                    Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixDir) { throw "WiX Toolset nao encontrado em Program Files (x86)" }
          $wix = Join-Path $wixDir.FullName "bin"
          Write-Host "WiX: $wix"

          # Compila com WixUIExtension para UI com branding
          & "$wix\candle.exe" -arch x64 installer.wxs -o installer.wixobj `
            -ext "$wix\WixUIExtension.dll"
          if ($LASTEXITCODE -ne 0) { throw "candle.exe falhou com codigo $LASTEXITCODE" }

          # Linka com WixUIExtension
          & "$wix\light.exe" installer.wixobj -o rls_vpn.msi `
            -ext "$wix\WixUIExtension.dll"
          if ($LASTEXITCODE -ne 0) { throw "light.exe falhou com codigo $LASTEXITCODE" }

          $sz = [math]::Round((Get-Item rls_vpn.msi).Length / 1MB, 1)
          Write-Host "MSI compilado com sucesso: $sz MB"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rls_vpn_windows_x64
          path: |
            rls_vpn.exe
            rls_vpn.msi
            WebView2Loader.dll
            libgcc_s_seh-1.dll
            libstdc++-6.dll
            libwinpthread-1.dll
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "RLS Automacao VPN ${{ github.ref_name }}"
          body: |
            ## RLS Automacao VPN ${{ github.ref_name }}

            ### O que ha de novo nesta versao
            - **Interface WebView2**: dashboard HTML/CSS/JS completamente moderno com tema escuro
            - Janela redimensionavel — pode maximizar o ecra completo
            - Animacoes fluidas, transicoes CSS, hover states
            - Painel de configuracoes deslizante (drawer lateral)
            - Consola de registos colorida com auto-scroll
            - Cards de informacao (servidor, utilizador, conta, IP)
            - Progresso em tempo real com percentagem e descricao de passo
            - Toasts discretos para feedback de resultado
            - Instalacao in-app do SoftEther (op 5)
            - Instalador MSI com identidade visual RLS

            ### Como instalar
            1. Baixe **`rls_vpn.msi`** (recomendado)
            2. Execute o MSI como **Administrador**
            3. O SoftEther VPN Client e instalado automaticamente durante o MSI
            4. Abra o atalho **RLS Automacao VPN** no Ambiente de Trabalho

            > **Alternativa:** Se ja tiver o SoftEther instalado, pode usar apenas `rls_vpn.exe`

            ### Requisitos
            - Windows 10 / 11 (64-bit)
            - Permissoes de Administrador
          files: |
            rls_vpn.exe
            rls_vpn.msi
            WebView2Loader.dll
            libgcc_s_seh-1.dll
            libstdc++-6.dll
            libwinpthread-1.dll
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
