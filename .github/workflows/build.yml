name: Build RLS VPN (C)

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build Windows (MinGW-w64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2 + MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Compile resources
        shell: msys2 {0}
        run: |
          windres src/resource.rc -O coff -o src/resource.o

      - name: Compile application
        shell: msys2 {0}
        run: |
          gcc -Wall -O2 -Isrc -mwindows \
            -o rls_vpn.exe \
            src/main.c src/vpn.c src/resource.o \
            -lcomctl32 -lgdi32 -lshcore
          echo "Build successful: $(ls -lh rls_vpn.exe)"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: rls_vpn_windows_x64
          path: rls_vpn.exe
          if-no-files-found: error

      - name: Build NSIS installer
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        id: nsis
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          # Find makensis.exe
          $paths = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          )
          $makensis = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $makensis) {
            Write-Warning "makensis.exe not found - skipping installer"
            exit 0
          }
          Write-Host "Using makensis: $makensis"
          & $makensis /V3 installer.nsi
          if (Test-Path "RLS_VPN_Setup.exe") {
            Write-Host "Installer built: $((Get-Item RLS_VPN_Setup.exe).Length) bytes"
            echo "INSTALLER_BUILT=true" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "RLS Automacao VPN ${{ github.ref_name }}"
          body: |
            ## RLS Automacao VPN ${{ github.ref_name }}

            ### Como instalar
            1. Baixe `rls_vpn.exe` abaixo
            2. Execute como **Administrador**
            3. Na primeira execucao, o SoftEther VPN Client sera instalado automaticamente

            ### Requisitos
            - Windows 10 ou 11 (64-bit)
            - Permissoes de Administrador

            ### Arquivos
            - `rls_vpn.exe` — Executavel principal (basta executar como admin)
          files: |
            rls_vpn.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
