<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RLS VPN Client</title>
<style>
/* ── Reset & Variables ─────────────────────────────────────────── */
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --border:    #30363d;
  --accent:    #1f6feb;
  --accent-hv: #388bfd;
  --green:     #238636;
  --green-hv:  #2ea043;
  --green-fg:  #3fb950;
  --red:       #da3633;
  --red-hv:    #f85149;
  --yellow:    #d29922;
  --yellow-fg: #e3b341;
  --txt:       #e6edf3;
  --txt-muted: #8b949e;
  --txt-dim:   #484f58;
  --radius:    10px;
  --shadow:    0 4px 24px rgba(0,0,0,.45);
  --font:      'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono:      'Cascadia Code', 'Consolas', 'Courier New', monospace;
  --transition:160ms ease;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--bg); color:var(--txt);
            font-family:var(--font); font-size:14px; overflow:hidden; }

/* ── Scrollbar ──────────────────────────────────────────────────── */
::-webkit-scrollbar{ width:6px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover{ background:var(--txt-dim); }

/* ── Layout ─────────────────────────────────────────────────────── */
#app {
  display:flex; flex-direction:column; height:100%;
  transition: margin-right var(--transition);
}
#app.drawer-open { margin-right:320px; }

/* ── Header ─────────────────────────────────────────────────────── */
#header {
  display:flex; align-items:center; gap:12px;
  padding:14px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  position:relative;
}
#header::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--accent),transparent);
}
.logo-circle {
  width:38px; height:38px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent) 0%,#0550ae 100%);
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:15px; color:#fff;
  flex-shrink:0; box-shadow:0 0 12px rgba(31,111,235,.4);
}
#header-title { flex:1; }
#header-title h1 { font-size:16px; font-weight:700; line-height:1.2; }
#header-title .sub { font-size:11px; color:var(--txt-muted); }
#btn-settings {
  background:none; border:1px solid var(--border); border-radius:8px;
  color:var(--txt-muted); cursor:pointer; padding:7px 10px;
  display:flex; align-items:center; gap:6px; font-size:12px;
  transition:var(--transition);
}
#btn-settings:hover { border-color:var(--accent); color:var(--txt); }

/* ── Scroll container ───────────────────────────────────────────── */
#scroll {
  flex:1; overflow-y:auto; padding:18px 18px 12px;
  display:flex; flex-direction:column; gap:14px;
}

/* ── Status Card ────────────────────────────────────────────────── */
#status-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px 20px;
  display:flex; align-items:center; gap:16px;
  position:relative; overflow:hidden;
  transition:border-color var(--transition);
}
#status-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  background:var(--state-color, var(--txt-dim));
  border-radius:var(--radius) 0 0 var(--radius);
  transition:background var(--transition);
}
.pulse-ring {
  width:44px; height:44px; border-radius:50%; flex-shrink:0;
  background:rgba(var(--pulse-r,80),var(--pulse-g,80),var(--pulse-b,80),.15);
  display:flex; align-items:center; justify-content:center;
  position:relative; transition:background var(--transition);
}
.pulse-ring::after {
  content:''; position:absolute;
  width:100%; height:100%; border-radius:50%;
  background:rgba(var(--pulse-r,80),var(--pulse-g,80),var(--pulse-b,80),.2);
  animation:none;
}
.state-connected .pulse-ring::after { animation:pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%   { transform:scale(1);   opacity:.6; }
  50%  { transform:scale(1.45);opacity:0;  }
  100% { transform:scale(1);   opacity:.6; }
}
.state-icon { font-size:20px; position:relative; z-index:1; }
#status-text { flex:1; }
#status-label { font-size:18px; font-weight:700; transition:color var(--transition); }
#status-msg   { font-size:12px; color:var(--txt-muted); margin-top:3px; }
#status-badge {
  font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px;
  background:var(--state-color,var(--border));
  color:#fff; flex-shrink:0;
  transition:background var(--transition);
}

/* States */
.s-connected    { --state-color:var(--green);  --pulse-r:35; --pulse-g:134;--pulse-b:54; }
.s-connecting   { --state-color:var(--yellow); --pulse-r:210;--pulse-g:153;--pulse-b:34; }
.s-disconnected { --state-color:var(--txt-dim);}
.s-not-installed{ --state-color:var(--red);    }
.s-not-configured{ --state-color:var(--yellow); }

/* ── Main button ────────────────────────────────────────────────── */
#btn-main {
  width:100%; padding:16px; border:none; border-radius:var(--radius);
  font-size:16px; font-weight:700; cursor:pointer; letter-spacing:.5px;
  transition:background var(--transition), transform 80ms, box-shadow var(--transition);
  position:relative; overflow:hidden;
}
#btn-main:active { transform:scale(.98); }
#btn-main::after {
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,0);
  transition:background 120ms;
}
#btn-main:hover::after { background:rgba(255,255,255,.06); }
#btn-main:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-connect    { background:var(--green); color:#fff; box-shadow:0 4px 14px rgba(35,134,54,.35); }
.btn-connect:hover:not(:disabled) { background:var(--green-hv); }
.btn-disconnect { background:var(--red);   color:#fff; box-shadow:0 4px 14px rgba(218,54,51,.35); }
.btn-disconnect:hover:not(:disabled) { background:var(--red-hv); }
.btn-install    { background:var(--accent); color:#fff; box-shadow:0 4px 14px rgba(31,111,235,.35); }
.btn-install:hover:not(:disabled) { background:var(--accent-hv); }
.btn-setup      { background:var(--yellow); color:#000; }
.btn-setup:hover:not(:disabled) { filter:brightness(1.1); }
.btn-busy       { background:var(--surface); color:var(--txt-muted); border:1px solid var(--border); cursor:default; }

/* ── Progress ───────────────────────────────────────────────────── */
#progress-section {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 18px;
  display:none;
}
#progress-section.visible { display:block; }
#progress-label {
  font-size:12px; color:var(--txt-muted); margin-bottom:10px;
  display:flex; justify-content:space-between; align-items:center;
}
#progress-step { font-weight:600; color:var(--txt); }
#progress-pct  { font-family:var(--mono); font-size:11px; color:var(--accent); }
.progress-track {
  background:var(--border); border-radius:4px; height:6px; overflow:hidden;
}
.progress-fill {
  height:100%; border-radius:4px;
  background:linear-gradient(90deg,var(--accent),var(--accent-hv));
  transition:width 300ms ease;
  box-shadow:0 0 8px rgba(31,111,235,.4);
}

/* ── Info Grid ──────────────────────────────────────────────────── */
.info-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
}
.info-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px 14px;
}
.info-label {
  font-size:10px; font-weight:600; color:var(--txt-muted);
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px;
}
.info-value {
  font-size:14px; font-weight:600; color:var(--txt);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  font-family:var(--mono);
}
.info-value.highlight { color:var(--green-fg); }

/* ── IP Section ─────────────────────────────────────────────────── */
#ip-section {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 16px;
}
.section-title {
  font-size:12px; font-weight:700; color:var(--txt-muted);
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.ip-row { display:flex; gap:8px; align-items:flex-end; }
.ip-field { flex:1; }
.ip-field label { font-size:11px; color:var(--txt-muted); display:block; margin-bottom:5px; }
.ip-field input {
  width:100%; background:var(--bg); border:1px solid var(--border);
  color:var(--txt); border-radius:6px; padding:8px 10px;
  font-size:13px; font-family:var(--mono);
  outline:none; transition:border-color var(--transition);
}
.ip-field input:focus { border-color:var(--accent); }
.ip-field input::placeholder { color:var(--txt-dim); }
#btn-apply-ip {
  background:var(--accent); border:none; color:#fff;
  border-radius:6px; padding:9px 14px; cursor:pointer;
  font-size:12px; font-weight:600; flex-shrink:0;
  transition:background var(--transition);
}
#btn-apply-ip:hover { background:var(--accent-hv); }

/* ── Action Row ─────────────────────────────────────────────────── */
.action-row { display:flex; gap:8px; }
.action-btn {
  flex:1; padding:9px; border:1px solid var(--border);
  background:none; color:var(--txt-muted); border-radius:8px;
  cursor:pointer; font-size:12px; font-weight:600;
  transition:var(--transition); display:flex; align-items:center;
  justify-content:center; gap:5px;
}
.action-btn:hover { border-color:var(--accent); color:var(--txt); background:rgba(31,111,235,.08); }
.action-btn.danger:hover { border-color:var(--red); color:var(--red); background:rgba(218,54,51,.08); }
.action-btn:disabled { opacity:.4; cursor:not-allowed; }

/* ── Log Console ────────────────────────────────────────────────── */
#log-section {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
  display:flex; flex-direction:column;
}
.log-header {
  display:flex; align-items:center; padding:10px 14px;
  border-bottom:1px solid var(--border);
  cursor:pointer; user-select:none;
}
.log-header:hover { background:rgba(255,255,255,.03); }
.log-title { font-size:12px; font-weight:700; color:var(--txt-muted);
             text-transform:uppercase; letter-spacing:.8px; flex:1; }
.log-controls { display:flex; gap:8px; align-items:center; }
#log-count {
  background:var(--border); border-radius:10px;
  padding:2px 7px; font-size:10px; font-family:var(--mono);
}
.log-toggle-btn {
  background:none; border:1px solid var(--border); border-radius:6px;
  color:var(--txt-muted); cursor:pointer; padding:3px 7px; font-size:11px;
}
.log-toggle-btn:hover { border-color:var(--accent); color:var(--txt); }
#log-body {
  font-family:var(--mono); font-size:12px; line-height:1.6;
  padding:10px 14px; overflow-y:auto; max-height:200px; min-height:80px;
  color:#adbac7;
}
.log-line { white-space:pre-wrap; word-break:break-all; }
.log-line.log-ok   { color:var(--green-fg); }
.log-line.log-err  { color:var(--red-hv); }
.log-line.log-warn { color:var(--yellow-fg); }
.log-line.log-info { color:var(--accent-hv); }

/* ── Settings Drawer ────────────────────────────────────────────── */
#drawer {
  position:fixed; top:0; right:0; bottom:0; width:320px;
  background:var(--surface); border-left:1px solid var(--border);
  transform:translateX(100%); transition:transform 200ms ease;
  display:flex; flex-direction:column; z-index:100;
  box-shadow:var(--shadow);
}
#drawer.open { transform:translateX(0); }
.drawer-header {
  display:flex; align-items:center; padding:16px 18px;
  border-bottom:1px solid var(--border);
}
.drawer-title { flex:1; font-size:15px; font-weight:700; }
#btn-close-drawer {
  background:none; border:1px solid var(--border); border-radius:6px;
  color:var(--txt-muted); cursor:pointer; padding:5px 9px; font-size:14px;
}
#btn-close-drawer:hover { border-color:var(--red); color:var(--red); }
.drawer-body { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:14px; }
.field-group { display:flex; flex-direction:column; gap:5px; }
.field-group label { font-size:12px; color:var(--txt-muted); font-weight:600; }
.field-group input {
  background:var(--bg); border:1px solid var(--border);
  color:var(--txt); border-radius:8px; padding:9px 12px;
  font-size:13px; outline:none;
  transition:border-color var(--transition);
}
.field-group input:focus { border-color:var(--accent); }
.drawer-footer { padding:14px 18px; border-top:1px solid var(--border); display:flex; gap:8px; }
#btn-save-config {
  flex:1; background:var(--accent); border:none; color:#fff;
  border-radius:8px; padding:10px; cursor:pointer;
  font-size:13px; font-weight:700;
  transition:background var(--transition);
}
#btn-save-config:hover { background:var(--accent-hv); }
#btn-discard {
  background:none; border:1px solid var(--border); border-radius:8px;
  color:var(--txt-muted); cursor:pointer; padding:10px 14px; font-size:13px;
}
#btn-discard:hover { border-color:var(--txt-muted); color:var(--txt); }

/* ── Toast ───────────────────────────────────────────────────────── */
#toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(60px);
  background:#161b22; border:1px solid var(--border); border-radius:8px;
  padding:10px 20px; font-size:13px; font-weight:600;
  box-shadow:var(--shadow); transition:transform 250ms ease, opacity 250ms;
  opacity:0; pointer-events:none; z-index:200; white-space:nowrap;
}
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
#toast.t-ok   { border-color:var(--green);  color:var(--green-fg); }
#toast.t-err  { border-color:var(--red);    color:var(--red-hv); }
#toast.t-info { border-color:var(--accent); color:var(--accent-hv); }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header id="header">
    <div class="logo-circle">R</div>
    <div id="header-title">
      <h1>RLS Automação</h1>
      <div class="sub">VPN Client v1.3.0</div>
    </div>
    <button id="btn-settings" onclick="toggleDrawer()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
      </svg>
      Configurações
    </button>
  </header>

  <!-- Main scroll area -->
  <div id="scroll">

    <!-- Status card -->
    <div id="status-card" class="s-disconnected">
      <div class="pulse-ring">
        <span class="state-icon" id="state-icon">⭘</span>
      </div>
      <div id="status-text">
        <div id="status-label">Desconectado</div>
        <div id="status-msg">Pronto para ligar</div>
      </div>
      <span id="status-badge">OFFLINE</span>
    </div>

    <!-- Main action button -->
    <button id="btn-main" class="btn-connect" onclick="mainAction()">LIGAR VPN</button>

    <!-- Progress section -->
    <div id="progress-section">
      <div id="progress-label">
        <span id="progress-step">Iniciando...</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Connection info -->
    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Servidor</div>
        <div class="info-value" id="info-server">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">Utilizador</div>
        <div class="info-value" id="info-user">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">Hub / Conta</div>
        <div class="info-value" id="info-account">—</div>
      </div>
      <div class="info-card">
        <div class="info-label">IP Local</div>
        <div class="info-value highlight" id="info-ip">—</div>
      </div>
    </div>

    <!-- IP configuration -->
    <div id="ip-section">
      <div class="section-title">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm1 3v1h6V7H1zm7 0v1h1V7H8zm2 0v1h1V7h-1zm2 0v1h2V7h-2zm-6 3v1h1v-1H6zm2 0v1h1v-1H8z"/>
        </svg>
        Configuração de IP
      </div>
      <div class="ip-row">
        <div class="ip-field">
          <label>Endereço IP</label>
          <input id="inp-ip" type="text" placeholder="192.168.x.x" />
        </div>
        <div class="ip-field">
          <label>Máscara</label>
          <input id="inp-mask" type="text" placeholder="255.255.255.0" />
        </div>
        <button id="btn-apply-ip" onclick="applyIp()">Aplicar</button>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="action-row">
      <button class="action-btn" id="btn-setup" onclick="doSetup()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
        </svg>
        Configurar NIC
      </button>
      <button class="action-btn danger" id="btn-reset" onclick="doReset()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
          <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
        </svg>
        Repor Config.
      </button>
    </div>

    <!-- Log console -->
    <div id="log-section">
      <div class="log-header" onclick="toggleLog()">
        <span class="log-title">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="margin-right:5px">
            <path d="M5 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5zM4 5a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5z"/>
          </svg>
          Registos
        </span>
        <div class="log-controls">
          <span id="log-count">0</span>
          <button class="log-toggle-btn" onclick="clearLog(event)">Limpar</button>
          <span id="log-arrow" style="color:var(--txt-muted);font-size:11px">▼</span>
        </div>
      </div>
      <div id="log-body"></div>
    </div>

  </div><!-- /scroll -->
</div><!-- /app -->

<!-- Settings Drawer -->
<div id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Configurações VPN</span>
    <button id="btn-close-drawer" onclick="toggleDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="field-group">
      <label>Servidor (Host / IP)</label>
      <input id="cfg-host" type="text" placeholder="10.201.114.222"/>
    </div>
    <div class="field-group">
      <label>Porta</label>
      <input id="cfg-port" type="number" placeholder="443"/>
    </div>
    <div class="field-group">
      <label>Hub Virtual</label>
      <input id="cfg-hub" type="text" placeholder="DEFAULT"/>
    </div>
    <div class="field-group">
      <label>Utilizador</label>
      <input id="cfg-user" type="text" placeholder="luiz"/>
    </div>
    <div class="field-group">
      <label>Palavra-passe</label>
      <input id="cfg-pass" type="password" placeholder="••••••••"/>
    </div>
  </div>
  <div class="drawer-footer">
    <button id="btn-save-config" onclick="saveConfig()">Guardar</button>
    <button id="btn-discard" onclick="toggleDrawer()">Cancelar</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ================================================================
   State
   ================================================================ */
const S = {
  state:   'DISCONNECTED',   /* NOT_INSTALLED | NOT_CONFIGURED | DISCONNECTED | CONNECTING | CONNECTED */
  busy:    false,
  message: '',
  ip:      '',
  server:  '',
  user:    '',
  account: ''
};

let logCount = 0;
let logExpanded = true;

/* ================================================================
   C → JS: receive messages from WebView2 host
   ================================================================ */
window.chrome.webview.addEventListener('message', e => {
  let msg;
  try { msg = JSON.parse(e.data); } catch { return; }

  switch (msg.type) {
    case 'status':   handleStatus(msg);   break;
    case 'log':      handleLog(msg.msg);  break;
    case 'progress': handleProgress(msg); break;
    case 'result':   handleResult(msg);   break;
    case 'config':   handleConfig(msg);   break;
  }
});

/* ================================================================
   Status update
   ================================================================ */
function handleStatus(msg) {
  S.state   = msg.state   || S.state;
  S.busy    = !!msg.busy;
  S.message = msg.message || '';
  S.ip      = msg.ip      || '';
  S.server  = msg.server  || '';
  S.user    = msg.user    || '';
  S.account = msg.account || '';
  renderState();
}

function renderState() {
  const card  = document.getElementById('status-card');
  const icon  = document.getElementById('state-icon');
  const lbl   = document.getElementById('status-label');
  const sub   = document.getElementById('status-msg');
  const badge = document.getElementById('status-badge');
  const btn   = document.getElementById('btn-main');
  const prog  = document.getElementById('progress-section');

  /* Remove all state classes */
  card.classList.remove('s-connected','s-connecting','s-disconnected','s-not-installed','s-not-configured');

  const MAP = {
    CONNECTED:     { cls:'s-connected',     ico:'✓', lbl:'Conectado',         bdg:'ONLINE',         btnTxt:'DESLIGAR VPN', btnCls:'btn-disconnect' },
    CONNECTING:    { cls:'s-connecting',    ico:'↻', lbl:'A ligar...',         bdg:'A LIGAR',        btnTxt:'A LIGAR...',   btnCls:'btn-busy'       },
    DISCONNECTED:  { cls:'s-disconnected',  ico:'⭘', lbl:'Desconectado',       bdg:'OFFLINE',        btnTxt:'LIGAR VPN',    btnCls:'btn-connect'    },
    NOT_INSTALLED: { cls:'s-not-installed', ico:'✕', lbl:'SoftEther em falta', bdg:'INSTALAR',       btnTxt:'INSTALAR SOFTETHER', btnCls:'btn-install' },
    NOT_CONFIGURED:{ cls:'s-not-configured',ico:'⚙', lbl:'Não configurado',    bdg:'CONFIGURAR',     btnTxt:'CONFIGURAR NIC', btnCls:'btn-setup'    },
  };

  const m = MAP[S.state] || MAP.DISCONNECTED;
  card.classList.add(m.cls);
  icon.textContent  = m.ico;
  lbl.textContent   = m.lbl;
  sub.textContent   = S.message || (S.state === 'CONNECTED' ? 'Ligação activa' : 'Aguardando comando');
  badge.textContent = m.bdg;

  /* Button */
  btn.className = 'btn-main ' + m.btnCls;
  btn.textContent = m.btnTxt;
  btn.disabled    = S.busy;

  /* Progress */
  prog.classList.toggle('visible', S.busy);

  /* Info cards */
  const setInfo = (id, v) => document.getElementById(id).textContent = v || '—';
  setInfo('info-server',  S.server);
  setInfo('info-user',    S.user);
  setInfo('info-account', S.account);
  setInfo('info-ip',      S.ip);

  /* Setup button */
  document.getElementById('btn-setup').disabled  = S.busy;
  document.getElementById('btn-reset').disabled  = S.busy;
}

/* ================================================================
   Progress update
   ================================================================ */
function handleProgress(msg) {
  const pct  = Math.max(0, Math.min(100, msg.value || 0));
  const step = msg.step || '';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent  = pct + '%';
  if (step) document.getElementById('progress-step').textContent = step;
}

/* ================================================================
   Log
   ================================================================ */
function handleLog(text) {
  if (!text) return;
  const body = document.getElementById('log-body');
  const line = document.createElement('div');
  line.className = 'log-line ' + classifyLog(text);

  const ts = new Date().toLocaleTimeString('pt-PT', {hour12:false});
  line.textContent = `[${ts}] ${text}`;

  body.appendChild(line);
  body.scrollTop = body.scrollHeight;

  logCount++;
  document.getElementById('log-count').textContent = logCount > 999 ? '999+' : logCount;
}

function classifyLog(txt) {
  const t = txt.toLowerCase();
  if (/\berro\b|error|falha|fail|nao foi/.test(t)) return 'log-err';
  if (/\baviso\b|warn/.test(t))                    return 'log-warn';
  if (/sucesso|succe|conclu|ok\b|pronto|ready/.test(t)) return 'log-ok';
  if (/\[.*\]/.test(txt))                          return 'log-info';
  return '';
}

function clearLog(e) {
  e.stopPropagation();
  document.getElementById('log-body').innerHTML = '';
  logCount = 0;
  document.getElementById('log-count').textContent = '0';
}

function toggleLog() {
  logExpanded = !logExpanded;
  document.getElementById('log-body').style.display = logExpanded ? '' : 'none';
  document.getElementById('log-arrow').textContent = logExpanded ? '▼' : '▶';
}

/* ================================================================
   Result (toast)
   ================================================================ */
function handleResult(msg) {
  showToast(msg.msg || '', msg.ok ? 't-ok' : 't-err');
}

/* ================================================================
   Config (populate drawer)
   ================================================================ */
function handleConfig(msg) {
  document.getElementById('cfg-host').value = msg.host || '';
  document.getElementById('cfg-port').value = msg.port || 443;
  document.getElementById('cfg-hub').value  = msg.hub  || '';
  document.getElementById('cfg-user').value = msg.user || '';
  /* never pre-fill password */
}

/* ================================================================
   JS → C: send commands
   ================================================================ */
function post(obj) {
  window.chrome.webview.postMessage(JSON.stringify(obj));
}

function mainAction() {
  if (S.busy) return;
  switch (S.state) {
    case 'NOT_INSTALLED':  post({cmd:'install'});   break;
    case 'NOT_CONFIGURED': post({cmd:'setup'});     break;
    case 'CONNECTED':      post({cmd:'disconnect'}); break;
    default:               post({cmd:'connect'});
  }
}

function doSetup()  { if (!S.busy) post({cmd:'setup'}); }
function doReset() {
  if (S.busy) return;
  if (confirm('Repor todas as configurações VPN?')) post({cmd:'reset'});
}

function applyIp() {
  const ip   = document.getElementById('inp-ip').value.trim();
  const mask = document.getElementById('inp-mask').value.trim();
  if (!ip) { showToast('Insira um endereço IP', 't-err'); return; }
  post({cmd:'applyIp', ip, mask: mask || '255.255.255.0'});
}

function saveConfig() {
  const host = document.getElementById('cfg-host').value.trim();
  const port = parseInt(document.getElementById('cfg-port').value) || 443;
  const hub  = document.getElementById('cfg-hub').value.trim();
  const user = document.getElementById('cfg-user').value.trim();
  const pass = document.getElementById('cfg-pass').value;
  if (!host) { showToast('Servidor obrigatório', 't-err'); return; }
  post({cmd:'saveConfig', host, port, hub, user, pass});
  toggleDrawer();
  showToast('Configuração guardada', 't-ok');
}

/* ================================================================
   Drawer
   ================================================================ */
function toggleDrawer() {
  const d = document.getElementById('drawer');
  const a = document.getElementById('app');
  const isOpen = d.classList.contains('open');
  d.classList.toggle('open', !isOpen);
  a.classList.toggle('drawer-open', !isOpen);
  if (!isOpen) post({cmd:'getConfig'});
}

/* ================================================================
   Toast
   ================================================================ */
let toastTimer;
function showToast(msg, cls) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (cls||'t-info');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3200);
}

/* ================================================================
   Init
   ================================================================ */
renderState();

/* Animate icon */
setInterval(() => {
  if (S.state === 'CONNECTING') {
    const ico = document.getElementById('state-icon');
    ico.style.transform = 'rotate(' + (Date.now()/5 % 360) + 'deg)';
  } else {
    document.getElementById('state-icon').style.transform = '';
  }
}, 50);
</script>
</body>
